name: App Store Packages

on:
  push:
    branches: [main]
    paths:
      - 'examples/dashboards/Asset Utilization/**'
      - 'examples/Asset Utilization/**'
      - 'scripts/build-appstore-nipkgs.js'
      - 'package.json'
      - '.github/workflows/appstore-packages.yml'
  pull_request:
    branches: [main]
    paths:
      - 'examples/dashboards/Asset Utilization/**'
      - 'examples/Asset Utilization/**'
      - 'scripts/build-appstore-nipkgs.js'
      - 'package.json'
      - '.github/workflows/appstore-packages.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Build .nipkg packages
        run: npm run build:nipkg

      - name: Upload nipkg artifacts
        uses: actions/upload-artifact@v4
        with:
          name: appstore-nipkgs
          path: |
            dist/nipkgs/*.nipkg
            dist/nipkgs/*.manifest.json

  open-appstore-pr:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Download nipkg artifacts
        uses: actions/download-artifact@v4
        with:
          name: appstore-nipkgs
          path: dist/nipkgs

      - name: Checkout systemlink-app-store
        uses: actions/checkout@v4
        with:
          repository: ni/systemlink-app-store
          token: ${{ secrets.APP_STORE_PAT }}
          path: app-store
          ref: main

      - name: Prepare submission and open PR
        working-directory: app-store
        env:
          GH_TOKEN: ${{ secrets.APP_STORE_PAT }}
        run: |
          BRANCH="auto/enterprise-examples-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"

          for pkg in ../dist/nipkgs/*.nipkg; do
            PKG_NAME=$(basename "$pkg" | sed 's/_[0-9].*//')
            mkdir -p "submissions/$PKG_NAME"
            cp "$pkg" "submissions/$PKG_NAME/"

            MANIFEST="../dist/nipkgs/${PKG_NAME}.manifest.json"
            if [ -f "$MANIFEST" ]; then
              cp "$MANIFEST" "submissions/$PKG_NAME/manifest.json"
            fi
          done

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add submissions/
          git commit -m "feat: update Asset Utilization packages

          Auto-generated from ni/systemlink-enterprise-examples@${{ github.sha }}"
          git push origin "$BRANCH"

          gh pr create \
            --repo ni/systemlink-app-store \
            --base main \
            --head "$BRANCH" \
            --title "feat: Update Asset Utilization packages" \
            --body "Automated update of Asset Utilization packages from
          [systemlink-enterprise-examples@${{ github.sha }}](https://github.com/ni/systemlink-enterprise-examples/commit/${{ github.sha }}).

          ### Packages updated
          - \`ni-example-asset-utilization-dashboard\`
          - \`ni-example-lab-utilization-dashboard\`
          - \`ni-example-system-utilization-dashboard\`
          - \`ni-example-utilization-etl-notebook\`

          ---
          _This PR was auto-generated by the appstore-packages workflow._" \
            --label "auto-generated"
