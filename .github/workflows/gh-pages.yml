name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Create site directory
        run: mkdir -p site

      - name: Build Node apps
        run: |
          REPO="${{ github.event.repository.name }}"
          BASE_DIR="examples/Web Apps/Framework Examples"

          for framework_dir in "$BASE_DIR"/*/; do
            FRAMEWORK=$(basename "$framework_dir")
            if [[ "$FRAMEWORK" == "Blazor" ]]; then
              continue
            fi
            for app_dir in "$framework_dir"*/; do
              if [ ! -d "$app_dir" ]; then continue; fi
              APP=$(basename "$app_dir")
              echo "==> Building $FRAMEWORK/$APP"
              BASE_PATH="/$REPO/$FRAMEWORK/$APP/"
              (cd "$app_dir" && VITE_BASE_PATH="$BASE_PATH" npm ci && VITE_BASE_PATH="$BASE_PATH" npm run build)
              mkdir -p "site/$FRAMEWORK/$APP"
              cp -r "$app_dir"dist/. "site/$FRAMEWORK/$APP/"
            done
          done

      - name: Build Blazor apps
        run: |
          REPO="${{ github.event.repository.name }}"
          BASE_DIR="examples/Web Apps/Framework Examples/Blazor"

          for app_dir in "$BASE_DIR"/*/; do
            if [ ! -d "$app_dir" ]; then continue; fi
            APP=$(basename "$app_dir")
            echo "==> Building Blazor/$APP"
            BASE_PATH="/$REPO/Blazor/$APP/"
            (cd "$app_dir" && dotnet restore && dotnet publish *.csproj -o dist)
            # Inject <base href> as the first element inside <head>
            sed -i "s|<head>|<head>\n    <base href=\"$BASE_PATH\" />|" "$app_dir"dist/wwwroot/index.html
            mkdir -p "site/Blazor/$APP"
            cp -r "$app_dir"dist/wwwroot/. "site/Blazor/$APP/"
          done

      - name: Generate landing page
        run: |
          REPO="${{ github.event.repository.name }}"
          BASE_DIR="examples/Web Apps/Framework Examples"
          LINKS=""

          for framework_dir in "$BASE_DIR"/*/; do
            FRAMEWORK=$(basename "$framework_dir")
            for app_dir in "$framework_dir"*/; do
              if [ ! -d "$app_dir" ]; then continue; fi
              APP=$(basename "$app_dir")
              LINKS="${LINKS}<li><a href=\"/$REPO/$FRAMEWORK/$APP/\">$FRAMEWORK / $APP</a></li>"
            done
          done

          cat > site/index.html <<EOF
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0" />
            <title>SystemLink Enterprise Examples</title>
            <style>
              body { font-family: sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
              h1 { font-size: 1.5rem; }
              ul { line-height: 2; }
            </style>
          </head>
          <body>
            <h1>SystemLink Enterprise Examples</h1>
            <ul>${LINKS}</ul>
          </body>
          </html>
          EOF

      - name: Add .nojekyll
        run: touch site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
