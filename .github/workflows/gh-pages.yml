name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Create site directory
        run: mkdir -p site

      - name: Build Node apps
        run: |
          REPO="${{ github.event.repository.name }}"
          BASE_DIR="examples/Web Apps/Framework Examples"

          for framework_dir in "$BASE_DIR"/*/; do
            FRAMEWORK=$(basename "$framework_dir")
            if [[ "$FRAMEWORK" == "Blazor" ]]; then
              continue
            fi
            for app_dir in "$framework_dir"*/; do
              if [ ! -d "$app_dir" ]; then continue; fi
              APP=$(basename "$app_dir")
              echo "==> Building $FRAMEWORK/$APP"
              BASE_PATH="/$REPO/$FRAMEWORK/$APP/"
              (cd "$app_dir" && VITE_BASE_PATH="$BASE_PATH" npm ci && VITE_BASE_PATH="$BASE_PATH" npm run build)
              mkdir -p "site/$FRAMEWORK/$APP"
              cp -r "$app_dir"dist/. "site/$FRAMEWORK/$APP/"
            done
          done

      - name: Build Blazor apps
        run: |
          REPO="${{ github.event.repository.name }}"
          BASE_DIR="examples/Web Apps/Framework Examples/Blazor"

          for app_dir in "$BASE_DIR"/*/; do
            if [ ! -d "$app_dir" ]; then continue; fi
            APP=$(basename "$app_dir")
            echo "==> Building Blazor/$APP"
            BASE_PATH="/$REPO/Blazor/$APP/"
            (cd "$app_dir" && dotnet restore && dotnet publish *.csproj -o dist)
            # Inject <base href> as the first element inside <head>
            sed -i "s|<head>|<head>\n    <base href=\"$BASE_PATH\" />|" "$app_dir"dist/wwwroot/index.html
            mkdir -p "site/Blazor/$APP"
            cp -r "$app_dir"dist/wwwroot/. "site/Blazor/$APP/"
          done

      - name: Build landing page
        run: |
          REPO="${{ github.event.repository.name }}"
          BASE_DIR="examples/Web Apps/Framework Examples"
          APP_LIST="["
          first=true

          for framework_dir in "$BASE_DIR"/*/; do
            FRAMEWORK=$(basename "$framework_dir")
            for app_dir in "$framework_dir"*/; do
              if [ ! -d "$app_dir" ]; then continue; fi
              APP=$(basename "$app_dir")
              PATH_URL="/$REPO/$FRAMEWORK/$APP/"
              if [ "$first" = true ]; then first=false; else APP_LIST="${APP_LIST},"; fi
              APP_LIST="${APP_LIST}{\"framework\":\"$FRAMEWORK\",\"app\":\"$APP\",\"path\":\"$PATH_URL\"}"
            done
          done
          APP_LIST="${APP_LIST}]"

          LANDING="examples/Web Apps/landing-page"
          BASE_PATH="/$REPO/"
          (cd "$LANDING" && npm ci && VITE_BASE_PATH="$BASE_PATH" VITE_APP_LIST="$APP_LIST" npm run build)
          cp -r "$LANDING/dist/." site/

      - name: Add .nojekyll
        run: touch site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
