<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BlazorWasmAuthExample</title>
    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="BlazorWasmAuthExample.styles.css" rel="stylesheet" />
    <link
      href="_content/NimbleBlazor/nimble-tokens/css/fonts.css"
      rel="stylesheet"
    />
    <script
      src="_content/NimbleBlazor/nimble-components/all-components-bundle.min.js"
      type="module"
    ></script>
    <script type="importmap"></script>
  </head>

  <body>
    <nimble-theme-provider color-scheme="light">
      <div id="app">
        <svg class="loading-progress">
          <circle r="40%" cx="50%" cy="50%" />
          <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
      </div>
    </nimble-theme-provider>

    <div id="blazor-error-ui">
      An unhandled error has occurred.
      <a href="." class="reload">Reload</a>
      <span class="dismiss">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
  </body>
</html>
